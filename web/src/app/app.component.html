<nav class="navbar navbar-expand fixed-top bg-green">
    <div class="container-fluid">
        <a class="navbar-brand" routerLink="/">Farmers</a>
        <div class="collapse navbar-collapse">
            <div class="me-auto mb-2 mb-md-0">
                <ol class="breadcrumb p-3">
                <ng-container *ngFor="let breadcrumb of breadcrumbs; let last = last">
                    <ng-container *ngIf="!last">
                        <li class="breadcrumb-item">
                            <a [routerLink]="breadcrumb.url">{{ breadcrumb.label }}</a> :gt;
                        </li>
                    </ng-container>
                    <ng-container *ngIf="last">
                        <li class="breadcrumb-item">
                            {{ breadcrumb.label }}asd
                        </li>
                    </ng-container>
                </ng-container>
                </ol>
            </div>
            <div>
                <div *ngIf="isLoggedIn();then userarea else login" class="d-flex"></div>
                <ng-template #login>
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" routerLink="login">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" routerLink="register">Register</a>
                        </li>
                    </ul>
                </ng-template>
                <ng-template #userarea>
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" routerLink="user">Profile</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" routerLink="" (click)="logout()">Logout</a>
                        </li>
                    </ul>
                </ng-template>
            </div>
        </div>
    </div>
</nav>

<main class="container">
    <router-outlet />
</main>
