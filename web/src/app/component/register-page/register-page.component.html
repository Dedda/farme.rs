<h1>Register now!</h1>

<form (ngSubmit)="registerAction()">
    <div class="form-floating">
        <input
            class="form-control"
            type="text"
            id="firstname"
            name="firstname"
            required
            [(ngModel)]="firstname"/>
        <label for="firstname">First name</label>
    </div>
    <div class="form-floating">
        <input
                class="form-control"
                type="text"
                id="lastname"
                name="lastname"
                required
                [(ngModel)]="lastname"/>
        <label for="lastname">Last name</label>
    </div>
    <div class="form-floating">
        <input
                class="form-control"
                type="text"
                id="username"
                name="username"
                required
                [(ngModel)]="username"/>
        <label for="username">Username</label>
    </div>
    <div class="form-floating">
        <input
                class="form-control"
                type="email"
                id="email"
                name="email"
                required
                [(ngModel)]="email"/>
        <label for="email">EMail</label>
    </div>
    <div class="form-floating">
        <input
                class="form-control"
                type="password"
                id="password"
                name="password"
                required
                [(ngModel)]="password"/>
        <label for="password">Password</label>
    </div>
    <div class="form-floating">
        <input
                class="form-control"
                type="password"
                id="confirm-password"
                name="confirm-password"
                required
                [(ngModel)]="confirm_password"/>
        <label for="confirm-password">Confirm password</label>
    </div>
    <div>
        <button
            class="btn btn-primary"
            [disabled]="submitting || !validate()"
            type="submit">Register</button>
    </div>
</form>
